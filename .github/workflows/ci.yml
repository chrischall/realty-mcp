name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build TS workspaces
        run: npm run build --workspace=@chrischall/realty-core

      - name: Test (full monorepo via vitest)
        run: npm test
